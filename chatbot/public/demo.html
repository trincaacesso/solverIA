<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SolverIA Chatbot — Demo</title>
  <style>
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#05060c;color:#eef1fb;display:grid;place-items:center;min-height:100vh;text-align:center;padding:24px}
    h1{font-size:clamp(1.6rem,4vw,2.4rem);margin:0 0 12px}
    p{color:#9aa4c7;max-width:520px;line-height:1.6}
    code{background:#121a33;padding:3px 8px;border-radius:6px;font-size:.85em}
  </style>
</head>
<body>
  <div>
    <h1>Página de teste do chatbot</h1>
    <p>Este é um site fictício de cliente. O widget da SolverIA aparece no canto inferior direito — clique para conversar. Ele foi carregado com apenas uma linha de <code>&lt;script&gt;</code>.</p>
    <p>Cliente carregado: <code>demo</code> (Studio FitPro)</p>
  </div>

  <!-- É ISTO que o cliente cola no site dele: -->
  <script src="/widget.js" data-client="demo" defer></script>
</body>
</html>
